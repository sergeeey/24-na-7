# Reflexio 24/7 — Production Docker Compose (VPS)
#
# ПОЧЕМУ отдельный файл от docker-compose.yml:
#   Dev: ./src монтируется для горячей перезагрузки
#   Prod: код запечён в образ → нет mount ./src (безопаснее, быстрее)
#
# Запуск:
#   docker compose -f docker-compose.prod.yml up -d
#
# Обновление (после git pull):
#   docker compose -f docker-compose.prod.yml build --no-cache
#   docker compose -f docker-compose.prod.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: reflexio-api
    # ПОЧЕМУ 1 worker: IngestWorker обрабатывает аудио через asyncio.to_thread(),
    # event loop не блокируется. 2 workers × (Whisper 2GB + resemblyzer 0.5GB) = 5GB > 4GB лимит → OOM.
    # С 1 worker всё помещается в 4GB и async pipeline отвечает мгновенно.
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--timeout-keep-alive", "120"]
    # ПОЧЕМУ только localhost: Caddy стоит снаружи и проксирует HTTPS→HTTP.
    # Открывать 8000 наружу не нужно — только Caddy должен видеть API.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DB_BACKEND=sqlite
      - LOG_LEVEL=INFO
      - SAFE_MODE=audit
      - RATE_LIMIT_STORAGE=redis
      - REDIS_URL=redis://redis:6379/0
      - FILTER_MUSIC=true
      - ASR_MODEL_SIZE=medium
      - ASR_LANGUAGE=ru
      # WHY: без INGEST_SYNC_PROCESS=1 REST /ingest/audio принимает файл,
      # но НЕ транскрибирует — висит в ingest_queue как "pending" навечно.
      - INGEST_SYNC_PROCESS=1
      # Cascade LLM: Gemini (free) → Claude Haiku → GPT-4o-mini
      - LLM_PROVIDER=cascade
      - LLM_CASCADE_ORDER=google,anthropic,openai
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # ПОЧЕМУ ./src целиком (не только storage):
      #   git pull + docker restart подхватывает новый код без rebuild образа.
      #   Экономит 10-15 мин и место на диске при каждом деплое.
      - ./src:/app/src
      - ./config:/app/config
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # ПОЧЕМУ 3.5 CPU: Whisper (cpu_threads=2) + uvicorn (0.5-1.5).
          # Предотвращает zombie workers от захвата всех 4 vCPU VPS.
          cpus: "3.5"
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - reflexio-net

  redis:
    image: redis:7-alpine
    container_name: reflexio-redis
    command: redis-server --save 60 1 --loglevel warning --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - reflexio-net

networks:
  reflexio-net:
    driver: bridge

volumes:
  redis-data:
    driver: local

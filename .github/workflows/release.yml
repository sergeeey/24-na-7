name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate release notes
      id: notes
      run: |
        {
          echo "notes<<EOF"
          echo "## Reflexio release ${{ github.ref_name }}"
          echo ""
          echo "### Highlights"
          echo "- episodic memory and digest pipeline updates"
          echo "- CI/security workflow updates"
          echo "- see commit history for full details"
          echo ""
          echo "### Commit"
          echo "- ${{ github.sha }}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        body: ${{ steps.notes.outputs.notes }}

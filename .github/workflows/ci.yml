name: CI

on:
  push:
    branches: [ main, develop, "codex/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with ruff
      run: |
        ruff check src tests

    - name: Type check with mypy
      run: |
        mypy src --ignore-missing-imports

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml --json-report --json-report-file=tests/.report.json
    
    - name: Check coverage threshold
      run: |
        coverage report --fail-under=80 || (echo "Coverage is below 80%" && exit 1)
    
    - name: Export OpenAPI spec
      run: |
        python scripts/export_openapi.py --output openapi.json

    - name: Upload test and API artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: quality-artifacts
        path: |
          coverage.xml
          tests/.report.json
          openapi.json
        retention-days: 14

    - name: Update metrics from tests
      if: always()
      run: |
        python scripts/auto_measure.py --checklist .cursor/tasks/surpass_smart_noter_checklist.yaml --report tests/.report.json --dry-run

  security:
    runs-on: ubuntu-latest
    needs: quality

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install bandit pip-audit safety

    - name: Security check (SAFE)
      run: |
        if [ -f ".cursor/validation/safe/run.py" ]; then
          python .cursor/validation/safe/run.py --mode audit
        else
          echo "SAFE validator not found; skipping explicit SAFE audit"
        fi

    - name: Security scan (Bandit)
      run: |
        bandit -r src -f json -o bandit-report.json

    - name: Security scan (Ruff security)
      run: |
        ruff check src tests --select S

    - name: Dependency security check (pip-audit)
      run: |
        pip-audit --desc

    - name: Dependency check (safety)
      run: |
        safety check --json

    - name: Upload security artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-artifacts
        path: |
          bandit-report.json
        retention-days: 14

    - name: Build API image for Trivy
      run: |
        docker build -f Dockerfile.api -t reflexio-api:latest .

    - name: Docker security scan (Trivy)
      if: always()
      run: |
        docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
          aquasec/trivy:latest image --severity HIGH,CRITICAL reflexio-api:latest

  build:
    runs-on: ubuntu-latest
    needs: [quality, security]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build API Docker image
      run: |
        docker build -f Dockerfile.api -t reflexio-api:latest .

    - name: Build Worker Docker image
      run: |
        docker build -f Dockerfile.worker -t reflexio-worker:latest .
